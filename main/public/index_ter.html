<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIDO | Moteur Sémantique</title>
    <link rel="stylesheet" href="style_ter.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>WIDO <span>Projet TER - Moteur Sémantique</span></h1>
            <p style="color: var(--text-dim); margin-top: -10px;">Interrogation avancée du graphe de connaissances JeuxDeMots</p>
        </header>

        <section class="search-section">
            <input type="text" id="query" placeholder="Ex: ($x r_isa artiste) ET ($x = ba%)" spellcheck="false" />
            <button onclick="lancerRecherche()">Analyser le graphe</button>
        </section>

        <main class="dashboard">
            <aside class="panel">
                <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Decision Logic (AST)
                </h3>
                <div id="ast-viewer" class="code-block">En attente d'analyse...</div>
            </aside>
            
            <section class="panel">
                <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    Résultats Filtrés
                </h3>
                <div id="resultat">
                    <div class="code-block" style="opacity: 0.5;">Entrez une requête complexe pour explorer les relations...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="script_ter.js"></script>
</body>
</html>
